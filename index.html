<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Expense Tracker</title>

        <link rel="icon" type="image/x-icon" href="./assets/logo.png" width="50px" />


        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=League+Gothic&display=swap"
            rel="stylesheet">

        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <h1>Expense Tracker</h1>

            <div class="balance-container">
                <h2>YOUR BALANCE</h2>
                <h1 id="balance">0.00৳</h1>

                <div class="summary">
                    <div class="income">
                        <h3>INCOME</h3>
                        <p id="income-amount">0.00৳</p>
                    </div>
                    <div class="expenses">
                        <h3>EXPENSE</h3>
                        <p id="expense-amount">0.00৳</p>
                    </div>
                </div>
            </div>
            <div class="main-content">
                <div class="transaction-container">
                    <h2>Transactions</h2>
                    <ul id="transaction-list">
                        <!-- TRANSACTIONS WILL BE INSERTED BY JS -->
                    </ul>
                </div>
                <div class="form-container">
                    <h2>Add Transactions</h2>
                    <form id="transaction-form">
                        <div class="form-group">
                            <label for="description">Description</label>
                            <input type="text" id="description" placeholder="Enter Description" required/>
                        </div>
                        <div class="form-group">
                            <label for="amount">Amount</label>
                            <input type="number" id="amount" placeholder="Enter Amount" required/>
                        </div>

                        <button type="submit">Add Transaction</button>
                        <small>Use negative (-) amount for expenses</small>
                    </form>
                </div>
            </div>


        </div>

        <script src="script.js"></script>
    </body>
</html>
